name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          crate_version="$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="v${crate_version}"
          fi
          tag_version="${release_tag#v}"
          if [[ "${tag_version}" != "${crate_version}" ]]; then
            echo "Release tag (${release_tag}) does not match Cargo.toml version (${crate_version})." >&2
            exit 1
          fi
          echo "version=${crate_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate project
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test

      - name: Build release artifacts
        run: bash scripts/build-release-artifacts.sh "${{ steps.version.outputs.version }}" dist

      - name: Build apt repository
        run: |
          bash scripts/build-apt-repo.sh \
            "dist/sqv_${{ steps.version.outputs.version }}_amd64.deb" \
            apt-repo \
            "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apt-repo

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS

  deploy-pages:
    needs: build-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    needs:
      - build-release
      - deploy-pages
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets artifact
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          overwrite_files: true
          tag_name: ${{ needs.build-release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS

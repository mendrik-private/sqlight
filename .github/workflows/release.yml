name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          crate_version="$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)"
          tag_name="${GITHUB_REF_NAME:-v${crate_version}}"
          tag_version="${tag_name#v}"
          if [[ "${tag_version}" != "${crate_version}" ]]; then
            echo "Tag version (${tag_version}) does not match Cargo.toml version (${crate_version})." >&2
            exit 1
          fi
          echo "version=${crate_version}" >> "${GITHUB_OUTPUT}"

      - name: Validate project
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test

      - name: Build release artifacts
        run: bash scripts/build-release-artifacts.sh "${{ steps.version.outputs.version }}" dist

      - name: Build apt repository
        run: |
          bash scripts/build-apt-repo.sh \
            "dist/sqv_${{ steps.version.outputs.version }}_amd64.deb" \
            apt-repo \
            "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apt-repo

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS

  deploy-pages:
    needs: build-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4
